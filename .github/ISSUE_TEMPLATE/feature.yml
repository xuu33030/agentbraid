name: Feature request
description: Propose a scoped capability or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
  - status:needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What observable behavior would solve the problem?
    validations:
      required: true
  - type: textarea
    id: policy
    attributes:
      label: Provider-policy and security impact
      description: Identify new credentials, commands, providers, or trust boundaries.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

