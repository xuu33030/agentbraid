name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Compatibility (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: macos-latest
            python: "3.11"
          - os: windows-latest
            python: "3.11"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  quality:
    name: Quality (${{ matrix.os }}, Python 3.13)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests scripts
      - name: Format check
        run: python -m ruff format --check src tests scripts
      - name: Type check
        run: python -m mypy src tests scripts
      - name: Test with coverage
        run: python -m pytest --cov=agentbraid --cov-report=term-missing -q
      - name: Audit runtime dependencies
        run: python -m pip_audit . --strict --progress-spinner off
      - name: Check dependency licenses
        run: python scripts/check_licenses.py
      - name: Build distributions
        run: python -m build
      - name: Verify metadata and smoke-test distributions
        run: python scripts/check_distribution.py
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: agentbraid-distributions-${{ matrix.os }}
          path: dist/
          if-no-files-found: error
